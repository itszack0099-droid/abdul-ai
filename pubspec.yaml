version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.3.0
